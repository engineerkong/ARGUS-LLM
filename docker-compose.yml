version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - argus-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - argus-network
    restart: unless-stopped

  argus-llm:
    build: .
    container_name: argus-llm
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=${OLLAMA_URL:-https://ollama.fit.fraunhofer.de/api}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      # 新增 Keycloak 相關環境變數
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_PUBLIC_URL=http://localhost:8080
      - KEYCLOAK_REALM=argus-realm
      - KEYCLOAK_CLIENT_ID=argus-client
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-HCWyCqdBFYmSh7EYilYvvkPaGyFtkDw0}
    volumes:
      - ./data:/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - keycloak
    networks:
      - argus-network
    restart: unless-stopped

networks:
  argus-network:
    driver: bridge

volumes:
  postgres_data: