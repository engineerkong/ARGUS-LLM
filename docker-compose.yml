version: "3.9"

services:
  argus-llm:
    build: .
    container_name: argus-llm
    ports:
      - "5000:5000"
    environment:
      # Ollama server URL — host.docker.internal resolves to your host machine
      # Override with: docker-compose up -e OLLAMA_URL=http://your-host:11434
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
    volumes:
      # Mount your local database directory into /data inside the container
      # Place your .gpkg files here and reference them as /data/yourfile.gpkg in the UI
      - ./data:/data:ro
    extra_hosts:
      # Ensures host.docker.internal resolves on Linux hosts
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
